services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      APP_URL: ${APP_URL:-http://localhost:3000}
      DATABASE_URL: postgresql://fahrduell:fahrduell@postgres:5432/fahrduell?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-local-dev-secret-change-me}
      ALLOW_DEMO_LOGIN: ${ALLOW_DEMO_LOGIN:-true}
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN:-http://localhost:3000}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fahrduell
      POSTGRES_PASSWORD: fahrduell
      POSTGRES_DB: fahrduell
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fahrduell -d fahrduell"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
